services:
  - type: web
    name: restapay-v2
    env: static
    buildCommand: echo "Using committed dist"
    staticPublishPath: dist
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
